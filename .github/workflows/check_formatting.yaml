name: Check formatting
on:
  push:
    branches:
      - "dev"
jobs:
  check_python_formatting:
    name: Check Python formatting
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install black isort pyyaml

      - name: Check formatting with black
        run: |
          (cd ./parladata && black . --check --diff)

      - name: Check formatting with isort
        run: |
          (cd ./parladata && isort . --check --diff --profile black)

      - name: Check parlacards i18n files for missing files or translation keys
        run: |
          python3 scripts/check_parlacards_i18n.py
