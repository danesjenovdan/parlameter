name: Test parladata
on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
jobs:
  test:
    name: Test parladata
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./parladata
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: parladata
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmemcached-dev libsasl2-modules
          python -m pip install --upgrade pip
          echo "git+https://github.com/danesjenovdan/classla.git@upgrade-numpy" >> requirements.txt
          pip install -r requirements.txt

      - name: Test with pytest
        env:
          DJANGO_SETTINGS_MODULE: parladata_project.settings.k8s
          DATABASE_HOST: postgres
        run: |
          pytest -n 4
