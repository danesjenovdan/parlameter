analysis-texts--party:
  presence_sessions:
    explanation:
      Ми рахуємо всі засідання та перевіряємо кожного члена парламентської
      фракції/групи, чи вони голосували хоча б один раз протягом засідання. Якщо вони
      голосували хоча б один раз, такий представник вважається присутнім. Сума всіх
      відвідувань ділиться на кількість членів парламентської фракції/групи, після
      чого результат ділиться на кількість засідань та стандартизується (від мінімально
      1 до максимально 100).
    titleSuffix: " результат аналізу присутності в залі Верховної Ради"
    label: Відвідування засідань
  vote_attendance:
    explanation:
      Ми рахуємо усі голосування, а також кількість представників парламентської
      фракції/групи присутніх на кожному із голосувань. Сума всіх поданих бюлетенів
      ділиться на кількість представників парламентської групи та кількість голосувань.
      Результат стандартизується (від мінімально 1 до максимально 100).
    label: Відвідування голосувань
    titleSuffix: " результати аналізу присутності під час голосувань"
  number_of_amendments:
    label: Кількість поправок
    titleSuffix: " glede na rezultate analize po št. vloženih amandmajev"
    explanation: ""
  intra_disunion:
    label: Розбіжності у голосуванні
    titleSuffix: " glede na neenotnost glasovanj"
    explanation: ""
  vocabulary_size:
    explanation:
      "Ми рахуємо всі унікальні слова у промові народного депутата. Потім
      ми рахуємо кількість повторень цих слів. Ми групуємо їх відповідно до кількості
      вживання. Зрештою, ми рахуємо коефіцієнт, який найкраще можна пояснити на такому
      прикладі: Для фрази «Сьогодні - новий день і сьогоднішній результат Парламетру»
      7 / ((3*2^2) + (4*1^2)) = 0,4375<br><br> Ми додаємо окремі результати для всієї
      парламентської групи та ділимо його на кількість представників групи. Ми ділимо
      окремі результати на загальну суму та стандартизуємо (від мінімально 1 до максимально
      100)."
    label: Сила висловлювань
    titleSuffix: " сила висловлювань"
  number_of_questions:
    label: Кількість депутатських запитань
    titleSuffix: " кількість депутатських запитань"
    explanation:
      Ми рахуємо усі запитання та ініціативи народних депутатів цього скликання
      Верховної Ради.
  seat_count:
    label: Кількість місць
    titleSuffix: " кількість місць"
    explanation:
      Ми отримуємо кількість місць парламентської фракції/групи шляхом
      підрахунку кількості всіх її активних учасників.
  privzdignjeno:
    label: Піднесена промова
    titleSuffix: " піднесена промова"
    explanation: >-
      Z združevanjem kvalifikatorjev SSKJ in SNB smo definirali ekscesno,
      privzdignjeno in preprosto besedje v poslanskih govorih. Upoštevani so le
      kvalifikatorji, ki so v obeh slovarjih tik za zaglavjem in imajo doseg do
      konca geselskega sestavka (ne pa tudi kvalifikatorji za posamezne pomene
      oziroma rabe). Podjetje Amebis je iz transkriptov poslanskih govorov
      pripravilo sezname besed, ki imajo katerega od izbranih
      kvalifikatorjev.<br>Privzdignjeno besedje<br>Kvalifikatorji iz
      SSKJ<br>evfemistično (evfem.), mitološko (mitol.), pesniško (pesn.),
      knjižno (knjiž.), zastarelo (zastar.), starinsko (star.)<br>Kvalifikatorji
      iz SNB<br>/<br><br>Za vsako poslansko skupino seštejemo rezultate
      poslancev in delimo s številom poslancev v njej. Posamezne seštevke delimo
      s skupnim seštevkom in normaliziramo (min 1 - max 100).
  preprosto:
    label: Проста промова
    titleSuffix: " проста промова"
    explanation: >-
      Z združevanjem kvalifikatorjev SSKJ in SNB smo definirali ekscesno,
      privzdignjeno in preprosto besedje v poslanskih govorih. Upoštevani so le
      kvalifikatorji, ki so v obeh slovarjih tik za zaglavjem in imajo doseg do
      konca geselskega sestavka (ne pa tudi kvalifikatorji za posamezne pomene
      oziroma rabe). Podjetje Amebis je iz transkriptov poslanskih govorov
      pripravilo sezname besed, ki imajo katerega od izbranih
      kvalifikatorjev.<br>Preprosto besedje<br>Kvalifikatorji iz SSKJ<br>narečno
      (nar.), pogovorno (pog.), nižje pogovorno (nižje pog.) <br>Kvalifikatorji
      iz SNB<br>pogovorno (pog.)<br><br>Za vsako poslansko skupino seštejemo
      rezultate poslancev in delimo s številom poslancev v njej. Posamezne
      seštevke delimo s skupnim seštevkom in normaliziramo (min 1 - max 100).
  problematicno:
    titleSuffix: " довга промова"
    label: Довга промова
    explanation: >-
      Z združevanjem kvalifikatorjev SSKJ in SNB smo definirali ekscesno,
      privzdignjeno in preprosto besedje v poslanskih govorih. Upoštevani so le
      kvalifikatorji, ki so v obeh slovarjih tik za zaglavjem in imajo doseg do
      konca geselskega sestavka (ne pa tudi kvalifikatorji za posamezne pomene
