    explanation:
      Кількість депутатських запитань та ініціатив у Верховній Раді у порівнянні
      із середніми та максимальними значеннями.
  speeches_per_session:
    label: Кількість промов під час одного засідання
    titleSuffix: " відсутність промов під час засідання"
    explanation:
      Ми рахуємо промови народних депутатів і ділимо їх на кількість засідань,
      під час яких народний депутат брав слово. Ми ділимо кількість усіх промов спочатку
      на кількість усіх народних депутатів, а потім, на кількість усіх засідань (під
      час яких лунали промови). Ми порівнюємо одиничний результат із середнім та максимальною
      значеннями.
  spoken_words:
    label: Кількість сказаних слів
    titleSuffix: " без промов"
    explanation:
      Кількість слів, сказаних народним депутатом у всіх попередніх промовах
      у Верховній Раді.
