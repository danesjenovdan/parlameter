notification-steps:
  - textfirst: >-
      Izberi besedo ali besedno zvezo, ki jo želiš spremljatii. Kmalu za tem, ko
      bo uporabljena v govoru, glasovanju ali zakonodaji, ti to sporočimo po
      e-pošti.
  - textfirst: >-
      Izberi način ujemanja sprožilca. Z natančnim ujemanjem bodo besede ali
      besedne zveze zaznane zgolj v taki obliki, kot so bile zapisane. S širokim
      ujemanjem bodo upoštevane tudi nekatere druge različice besede ali besedne
      zveze, kot so sklanjatve, spregatve ali sorodni izrazi.
    firstbullet: "Natančno ujemanje"
    secondbullet: "Široko ujemanje"
  - textfirst: Kako pogosto naj ti pišemo?
    firstbullet: Največ enkrat na dan
    secondbullet: Največ enkrat na teden
    thirdbullet: Največ enkrat na mesec
  - textfirst: Zaupaj nam e-naslov, na katerega ti naj pošiljamo obvestila.
    textsecond: >-
      Strinjam se, da mi Danes je nov dan po e-pošti pošilja obvestila, ko se
      izbrane besede ali besedne zveze uporabijo pri delu državnega zbora.
    submit: Prijavi me
  - textfirst: Zabeleženo!
    textsecond: >-
      Povezava za potrditev prijave in urejanje drugih nastavitev te čaka v
      e-poštnem predalu.
  - textfirst: Potrjeno!
    textsecond: Na e-naslov {email} prejmeš obvestila za besedo oz. besedno zvezo “{keyword}”.
  - textfirst: Napaka!
    textsecond: Prišlo je do napake pri shranjevanju obvestil.
