card:
  title: Glasanja
  info: >-
    # Pregled svih glasanja koja su održana na izabranoj sjednici.


    Za sva glasanja na pojedinačnoj sjednici prebrojimo sve glasove (ZA, PROTIV,
    SUZDRŽANI) te broj parlamentaraca i parlamentarki koji nisu glasali. Zatim
    ispišemo rezultat prema najčešćem glasu ili odsustvu.


    Pretraživačem možeš tražiti po naslovu glasanja, a filterima biraš prikaz
    samo usvojenih ili samo odbijenih glasanja.


    Skup glasanja preuzimamo s *web* stranice [PSBiH](http://www.parlament.ba).


    Za tačnost rezultata glasanja brinemo se najbolje što možemo, ali je,
    posebno kod suzdržanih i odsutnih glasova, ne možemo garantovati. Prisustvo
    parlamentaraca i parlamentarki na sjednicama PSBiH ne provjerava se pri
    svakom glasanju, pa se može desiti da je osoba bila suzdržana, ali je, zbog
    nedostatka podataka u dokumentu s rezultatima glasanja (koji koristimo kao
    izvor), na Parlametru ta osoba prikazana kao odsutna (rezultat: nije
    glasao/la).
