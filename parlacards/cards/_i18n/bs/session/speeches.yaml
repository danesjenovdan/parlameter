card:
  title: Transkript sjednice
  info: >-
    # Transkript svih govora parlamentaraca/ki na izabranoj sjednici.


    Transkript sjednice, koji je u obliku HTML dokumenta objavljen na *web*
    stranici [PSBiH](http://www.parlament.ba), automatski dijelimo na
    pojedinačne govorne nastupe i u izvornom redoslijedu spajamo u karticu
    “Transkript”.
