card:
  title: Legislativa
  info: >-
    # Lista svih zakona o kojima se glasalo na izabranoj sjednici.


    Pretraživačem možeš tražiti po naslovu, a rezultate možeš sortirati po
    nazivu, broju akta, datumu ili statusu (usvojen, odbijen, u proceduri ili
    obustavljen).


    Podatke preuzimamo s *web* stranice [PSBiH](http://www.parlament.ba).
