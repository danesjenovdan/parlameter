card:
  title: Obavještenja
  info: >-
    # Prijavite se na obavijesti Parlametra.

    Obavijesti vam omogućuju praćenje rasprava, glasanja i zakonodavnog postupka u Parlamentarnoj skupštini Bosne i Hercegovine. Možete odabrati riječ ili izraz za pretraživanje, odrediti nivo podudaranja i odabrati učestalost slanja obavijesti. Sistem će vam automatski slati obavijest e-mailom kada se odabrani izraz izgovori na sjednici Parlamentarne skupštine BiH ili nekog od njenih radnih tijela, odnosno kad se pojavi u nekom od glasanja ili u postupku donošenja nekog zakona.
