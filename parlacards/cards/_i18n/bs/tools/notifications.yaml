card:
  title: Obavještenja
  info: >-
    # Prijavite se na obavještenja Parlametra.

    Pomoću obavještenja omogućavamo vam praćenje rasprava u Parlamentarnoj
    skupštini BiH o određenim temama. Možete odabrati riječ ili izraz za
    pretragu, odrediti nivo podudaranja i odabrati učestalost slanja
    obavještenja. Sistem će vam automatski slati obavještenja putem
    e-maila kada se odabrani okidač izgovori na sjednici Parlamentarne
    skupštine BiH ili nekog od njenih radnih tijela.
