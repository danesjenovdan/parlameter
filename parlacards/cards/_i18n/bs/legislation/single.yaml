card:
  title: Zakon
  info: >-
    # Pregled izabranog zakona i svih glasanja i dokumenata povezanih s njim.


    Na vrhu kartice prikazan je status zakona.


    Prvi tab omogućava pregled svih glasanja koja su s njim povezana,
    uključujući ishod. Drugi tab prikazuje sve prikupljene dokumente vezane za
    zakonodavni postupak.


    Podatke preuzimamo s *web* stranice [PSBiH](http://www.parlament.ba), a
    analize s platforme Javna rasprava.
