card:
  title: Glasanja
  info: >-
    # Pregled svih glasanja zastupnika/ce u ovom mandatu.


    Prikazujemo glasanja u trenutnom mandatu zajedno sa zvaničnim ishodom i
    ličnim glasom zastupnika/ce.


    Pretraživačem možeš tražiti po naslovu glasanja, a filterima ograničiti
    prikaz prema ličnom glasu zastupnika/ce (ZA, PROTIV, SUZDRŽAN, NEMA).


    Skup glasanja preuzimamo s *web* stranice [PSBiH](http://www.parlament.ba).


    Za tačnost rezultata glasanja brinemo se najbolje što možemo, ali je,
    posebno kod suzdržanih i odsutnih glasova, ne možemo garantovati. Prisustvo
    zastupnika/ca na sjednicama PSBiH ne provjerava se pri svakom glasanju, pa
    se može desiti da je osoba bila suzdržana, ali je, zbog nedostatka podataka
    u dokumentu s rezultatima glasanja (koji koristimo kao izvor), na Parlametru
    ta osoba prikazana kao odsutna (rezultat: nije glasao/la).
