card:
  title: Prisustvo na glasanju sjednica PSBiH
  info: >-
    # Prisustvo zastupnika/ce na glasanju u poređenju s prosječnom i najvećom
    vrijednošću.


    Prebrojimo sve glasove koje je zastupnik/ca dao/la i taj broj dijelimo s
    ukupnim brojem svih glasanja na kojima je trebalo glasati. Rezultat
    prikazujemo zajedno s prosječnom i najvećom vrijednošću.


    Podatke preuzimamo s *web* stranice [PSBiH](http://www.parlament.ba).
  info2: >-
    # Prisustvo delegata/kinje na glasanju u poređenju s prosječnom i najvećom
    vrijednošću.


    Prebrojimo sve glasove koje je delegat/kinja dao/la i taj broj dijelimo s
    ukupnim brojem svih glasanja na kojima je trebalo/la glasati. Rezultat
    prikazujemo zajedno s prosječnom i najvećom vrijednošću.


    Podatke preuzimamo s *web* stranice [PSBiH](http://www.parlament.ba).
