card:
  title: Najčešće glasaju jednako
  info: >-
    # Lista pet zastupnika/ca koji/e najčešće glasaju isto kao izabrani/a
    zastupnik/ca.


    Lista je sortirana prema procentu podudaranja od najvećeg ka najmanjem.


    U analizu uključujemo samo ona glasanja na kojima su obje upoređivane osobe
    bile prisutne i glasale (ZA, PROTIV, SUZDRŽANO). Procenat podudaranja
    računamo tako što broj glasanja na kojima su obje osobe glasale isto
    dijelimo s ukupnim brojem glasanja na kojima su obje osobe bile prisutne.
  info2: >-
    # Lista pet delegata/kinja koji/e najčešće glasaju isto kao izabrani
    delegat/kinje.


    Lista je sortirana prema procentu podudaranja od najvećeg ka najmanjem.


    U analizu uključujemo samo ona glasanja na kojima su obje upoređivane osobe
