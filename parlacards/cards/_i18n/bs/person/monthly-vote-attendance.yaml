card:
  title: Prisutnost na glasanjima kroz vrijeme
  info: >-
    # Prisustvo zastupnika/ce na glasanju na sjednicama PSBiH kroz vrijeme.


    Za svaki mjesec prebrojimo sve glasove koje je zastupnik/ca dao/la. Taj broj
    dijelimo s ukupnim brojem svih glasanja na kojima se tog mjeseca glasalo.
    Ako osoba u izabranom mjesecu nije imala mandat, prikazujemo udio glasanja
    na kojima nije imala pravo glasa.
