card:
  title: Neslaganje s klubom
  info: >-
    # Odstupanje zastupnika/ce od većinskog glasa vlastite zastupničke grupe u
    poređenju s prosjekom i najvećom vrijednošću.


    Za sva glasanja prvo izračunamo većinski glas svakog kluba. To je glas (ZA,
    PROTIV, SUZDRŽANI, NEMA) koji je izabrala većina njegovih članova/ica.


    Zatim za svakog/u zastupnika/cu utvrdimo kojem klubu trenutno pripada.
    Procenat nepodudaranja računamo tako što broj glasanja na kojima je osoba
    glasala drugačije od većinskog glasa dijelimo s ukupnim brojem svih
    glasanja. Što je procenat veći, veće je odstupanje osobe od vlastitog kluba.


    Rezultat prikazujemo zajedno s prosjekom i najvećom vrijednošću.
