card:
  title: Popis zakona
  info: >-
    # Lista svih zakona i akata o kojima se glasalo u ovom sazivu PSBiH.


    Pretraživačem možeš tražiti po naslovu, a klikom na željeni filter biraš
    prikaz samo zakona iz Predstavničkog doma ili samo zakon iz Doma naroda.
    Rezultate možeš sortirati po nazivu, broju akta, datumu ili statusu
    (usvojen, odbijen, u proceduri ili obustavljen).


    Podatke preuzimamo s *web* stranice [PSBiH](http://www.parlament.ba).
