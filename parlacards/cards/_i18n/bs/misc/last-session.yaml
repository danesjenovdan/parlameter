card:
  title: Posljednja sjednica Predstavničkog doma
  title2: Posljednja sjednica Doma naroda
  tfidf-title: Riječi koje označavaju sjednicu
  attendance-title: Prisutnost klubova na sjednici na glasanju
  votes-title: Glasanja
  info: >-
    # Pregled analiza posljednje sjednice Predstavničkog doma za koju su podaci
    objavljeni na *web* stranici [PSBiH](http://www.parlament.ba).


    **PRISUTNOST KLUBOVA NA GLASANJIMA**


    Klubove razvrstavamo prema procentu, koji predstavlja zbir prisustva
    njihovih članova i članica na glasanju tokom izabrane sjednice.


    **GLASANJA**


    Za sva glasanja na pojedinačnoj sjednici prebrojimo sve glasove (ZA, PROTIV,
    SUZDRŽANI, NEMA) te broj zastupnika/ca koji/e nisu glasali/e. Zatim ispišemo
    rezultat prema najčešćem glasu ili odsustvu.


    Za tačnost rezultata glasanja brinemo se najbolje što možemo, ali je,
    posebno kod suzdržanih i odsutnih glasova, ne možemo garantovati. Prisustvo
    zastupnica/ka na sjednicama PD PSBiH ne provjerava se pri svakom glasanju,
    pa se može desiti da je osoba bila suzdržana tokom glasanja, ali je, zbog
    nedostatka podataka u dokumentu s rezultatima glasanja (koji koristimo kao
    izvor), na Parlametru ta osoba prikazana kao odsutna (rezultat: nije
    glasao/la).
