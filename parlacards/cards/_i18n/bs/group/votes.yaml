card:
  title: Glasanja
  info: >-
    # Pregled svih glasanja i većinskog glasa izabranog kluba.


    Za svako glasanje na sjednici prebrojimo sve glasove (ZA, PROTIV, SUZDRŽANI)
    te broj zastupnika i zastupnica koji nisu glasali. Na osnovu najčešćeg glasa
    ili odsustva ispišemo rezultat.


    Pretraživačem možeš tražiti po naslovu glasanja.


    Skup glasanja preuzimamo s *web* stranice [PSBiH](http://www.parlament.ba).


    Za tačnost rezultata glasanja brinemo se najbolje što možemo, ali je,
    posebno kod suzdržanih i odsutnih glasova, ne možemo garantovati. Prisustvo
    zastupnika i zastupnica na sjednicama PSBiH ne provjerava se pri svakom
    glasanju, pa se može desiti da je osoba bila suzdržana, ali je, zbog
    nedostatka podataka u dokumentu s rezultatima glasanja (koji koristimo kao
    izvor), na Parlametru ta osoba prikazana kao odsutna (rezultat: nije
    glasao/la).
