card:
  title: Prisustvo na glasanju sjednica PSBiH
  info: >-
    # Prisustvo izabranog kluba na glasanju u poređenju s prosjekom i najvećom
    vrijednošću.


    Prebrojimo sve glasove koje su dali svi članovi i članice izabranog kluba, a
    zatim taj broj podijelimo s brojem svih glasova koje je klub mogao dati.
    Rezultat izražavamo u procentima i upoređujemo s prosjekom i najvećom
    vrijednošću.


    Podatke preuzimamo s *web* stranice [PSBiH](http://www.parlament.ba).
