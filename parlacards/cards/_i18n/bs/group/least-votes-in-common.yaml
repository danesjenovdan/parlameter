card:
  title: Najrjeđe glasaju jednako
  info: >-
    # Lista pet zastupnika/ca koji/e najrjeđe glasaju isto kao većina u
    izabranom klubu.


    Poredani su prema procentu podudaranja od najmanjeg ka najvećem.


    Za svako glasanje najprije izračunamo većinski glas kluba (ZA, PROTIV,
    SUZDRŽANI, ODSUTNI), tj. onaj glas za koji se odlučilo najviše njegovih
    članova i članica. Glasanja na kojima je cijeli klub odsutan izostavljamo iz
    analize.


    Zatim izračunamo procenat podudaranja između rezultata glasanja kluba i
    rezultata glasanja svih zastupnika/ca ovog saziva doma PSBiH. To uradimo
    tako što broj glasanja na kojima je pojedina osoba glasala isto kao većina u
    grupi podijelimo s ukupnim brojem svih glasanja na kojima su bili prisutni i
    osoba i barem jedan/na član/ica kluba. Ako takvih glasanja nema, podudaranje
    je 0%.
