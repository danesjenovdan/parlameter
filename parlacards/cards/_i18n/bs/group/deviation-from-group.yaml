card:
  title: Neslaganje s klubom
  info: >-
    # Lista članova/ica izabranog kluba poredana je prema tome koliko često
    glasaju drugačije od većine u klubu. Što je vrijednost veća, to je
    podudaranje manje.


    Za svako glasanje najprije izračunamo većinski glas izabranog kluba (ZA,
    PROTIV, SUZDRŽANI, ODSUTNI), tj. onaj glas za koji se odlučilo najviše
    njegovih članova i članica.


    Zatim za svaku osobu izračunamo procenat nepodudaranja tako što broj
    glasanja na kojima je glasala drugačije od većinskog glasa podijelimo s
    ukupnim brojem svih glasanja. Što je procenat veći, to je veće odstupanje
    člana/ice od vlastitog kluba.


    Rezultati na listi poredani su od najvećeg odstupanja ka najmanjem.
