card:
  title: Zastupnička pitanja i inicijative
  info: >-
    # Ispis svih zastupničkih pitanja i inicijativa članova/ica izabranog kluba
    u ovom mandatu.


    Sva pitanja i inicijative razvrstamo po klubu, a uz to navedemo koji/e su ih
    članovi/ice postavili/e te koja je bila tema.


    Pitanja i inicijative preuzimamo s *web* stranice
    [PSBiH](http://www.parlament.ba).
