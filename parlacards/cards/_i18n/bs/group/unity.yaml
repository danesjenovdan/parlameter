card:
  title: Ujedinjenost glasanja
  info: >-
    # Ujedinjenost izabranog kluba na glasanjima u poređenju s prosjekom i
    najvećim nivoom ujedinjenosti među svim klubovima.


    Kod svakog glasanja za svaki klub najprije izračunamo koliko je članova/ica
    dalo koji glas (ZA, PROTIV, SUZDRŽANI, ODSUTNI). Zatim izračunamo procenat
    onih koji/e su glasali/e u skladu s većinskim izborom. Tako dobijemo mjeru
    ujedinjenosti, odnosno procenat zastupnika/ca koji/e su se složili/e s
    većinskim glasom.


    Na osnovu rezultata pojedinačnih glasanja izračunamo prosječni procenat
    slaganja, koji prikazujemo u kartici.
