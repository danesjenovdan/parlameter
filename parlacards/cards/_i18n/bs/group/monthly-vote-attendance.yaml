card:
  title: Prisutnost na glasanjima kroz vrijeme
  info: >-
    # Prisustvo izabranog kluba na glasanju na sjednicama PSBiH kroz vrijeme.


    Za svaki mjesec posebno prebrojimo sve glasove koje su dali/e svi/e
    članovi/ice izabranog kluba, a zatim taj broj podijelimo s brojem svih
    glasova koje je grupa u tom mjesecu mogla dati. Rezultat izražavamo u
    procentima i prikazujemo na grafikonu.


    Podatke preuzimamo s *web* stranice [PSBiH](http://www.parlament.ba).
