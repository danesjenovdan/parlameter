card:
  title: Govori
  info: >-
    # Lista svih govora članova/ica izabranog kluba u ovom mandatu, poredana po
    datumu.


    Na listu dodajemo linkove koji vode na sve govore članova/ica izabranog
    kluba, koje preuzimamo iz transkripata sjednica na *web* stranici
    [PSBiH](http://www.parlament.ba). Pretraživačem možeš tražiti po sadržaju
    govora, a filterom ograničiti prikaz na izabrani period.
