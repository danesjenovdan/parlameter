card:
  title: Glasanje
  info: >-
    # Pregled pojedinačnog glasanja na sjednici.


    Rezultat pojedinačnog glasanja ima tri različita prikaza: na nivou
    parlamentaraca/ki, na nivou klubova te na nivou vlade.


    Prvi tab omogućava pregled glasova parlamentaraca i parlamentarki,
    filtriranje prema vrijednosti glasanja (ZA, PROTIV, SUZDRŽANI, NEMA) te
    pretragu parlamentaraca i parlamentarki. Pored kružnog grafikona prikazuje
    se većinski glas doma PSBiH u tom glasanju: “60% ZA” znači da je ZA glasalo
    60% svih parlamentaraca/ki s pravom glasa na tom glasanju.


    Drugi tab prikazuje glasove klubova. Na kraju svake linije prikazan je
    većinski glas kluba, a opcije s vrijednostima glasanja otvaraju liste
    parlamentaraca/ki koji/e su dali/e takav glas.


    Treći tab prikazuje rezultat prema strani vlade. Ponovo se na kraju svake
    linije prikazuje većinski glas, a opcije s vrijednostima glasanja otvaraju
    liste parlamentaraca/ki koji/e su dali/e taj glas.


    Za tačnost rezultata glasanja brinemo se najbolje što možemo, ali je,
    posebno kod suzdržanih i odsutnih glasova, ne možemo garantovati. Prisustvo
    parlamentaraca/ki na sjednicama PSBiH ne provjerava se pri svakom glasanju,
    pa se može desiti da je osoba bila suzdržana, ali je, zbog nedostatka
    podataka u dokumentu s rezultatima glasanja (koji koristimo kao izvor), na
    Parlametru ta osoba prikazana kao odsutna (rezultat: nije glasao/la).


    Skup glasanja preuzimamo s *web* stranice [PSBiH](http://www.parlament.ba).
