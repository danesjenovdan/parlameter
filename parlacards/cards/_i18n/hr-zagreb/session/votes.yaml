card:
  title: Glasanja
  info: >-
    # Pregled rezultata svih glasanja na sjednici.


    Rezultate svih glasanja prikazujemo u kategorijama "ZA", "PROTIV" i "SUZDRŽANI",
    a glasove gradskih zastupnica i zastupnika koji nisu glasali ili su bili odsutni,
    vodimo u kategoriji "NEMA".


    Točnost prikazanih rezultata glasanja direktno ovisi o točnosti podataka koji
    se preuzimaju sa službenih stranica [Grada Zagreba](https://zagreb.hr/).
