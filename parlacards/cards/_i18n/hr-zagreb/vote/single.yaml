card:
  title: Glasanje
  info: >-
    # Detaljni prikaz rezultata glasanja po pojedinoj točki sjednice.


    Rezultati glasanja po svakoj točki prikazuju se na dvije razine: po svakom gradskom
    zastupniku i zastupnici, te po pripadnosti glasova zastupničkim klubovima.


    Odabirom "ZASTUPNICI" dobiva se pregled glasova gradskih zastupnika i zastupnica,
    te pretraživanje po vrijednosti glasova (ZA, PROTIV, SUZDRŽANI, NEMA) i imenu
    gradskog zastupnika ili zastupnice. 


    Uz rezultate glasanja po zastupničkim klubovima pridružen je kružni grafikon koji
    prikazuje stanje glasova u glasanju članica i članova zastupničkog kluba. Primjerice,
    "60% ZA" znači da je ZA glasalo 60% zastupnika i zastupnica.


    Treća kartica prikazuje dokumente i linkove koji su povezani s pojedinim glasanjem.

    Točnost prikazanih rezultata glasanja direktno ovisi o točnosti podataka koji
    se preuzimaju sa službenih stranica [Grada Zagreba] (https://zagreb.hr/).
