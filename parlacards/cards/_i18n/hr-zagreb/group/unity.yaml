card:
  title: Razjedinjenost glasanja
  info: >-
    # Ujedinjenost odabranog zastupničkog kluba na glasanju na sjednicama Gradske
    skupštine u odnosu na prosječnu i najvišu stopu ujedinjenosti unutar ostalih
    zastupničkih klubova.


    Računa se postotak glasova članica i članova zastupničkog kluba koji su bili u
    skladu s većinom u svom klubu, u odnosu na ukupan broj svih glasanja svih članica
    i članova kluba. Tako se dobiva stupanj ujedinjenosti unutar zastupničkog kluba.
