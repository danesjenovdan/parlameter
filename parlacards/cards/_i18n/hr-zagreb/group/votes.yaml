card:
  title: Glasanja
  info: >-
    # Pregled rezultata svih glasanja gradskih zastupnika i zastupnica odabranog zastupničkog
    kluba na sjednici Gradske skupštine.


    Kako je većinski glasao odabrani zastupnički klub vidi se u krajnjem lijevom stupcu
    po svakoj pojedinoj točki. Rezultate svih glasanja prikazujemo u kategorijama
    "ZA", "PROTIV" i "SUZDRŽANI", a glasove gradskih zastupnica i zastupnika koji
    nisu glasali ili su bili odsutni, vodimo u kategoriji "NEMA". 


    Točnost prikazanih rezultata glasanja ovisi o točnosti podataka koji se preuzimaju
    sa službenih stranica Podaci se preuzimaju s mrežnih stranica [Grada Zagreba]
    (https://zagreb.hr/).
