card:
  title: Razjedinjenost glasanja
  info: >-
    # Razjedinjenost odabranog zastupničkog kluba na glasanju na sjednicama Gradske
    skupštine u odnosu na prosječnu i najvišu stopu razjedinjenosti unutar ostalih
    zastupničkih klubova.


    Računa se postotak glasova članica i članova zastupničkog kluba koji su bili u
    skladu s većinom u svom klubu, u odnosu na ukupan broj svih glasanja svih članica
    i članova kluba. Taj postotak oduzima se od 100 % i tako se dobiva stupanj razjedinjenosti
    unutar zastupničkog kluba.
