card:
  title: Riječi koje označavaju klub
  info: >-
    # Ispis 10 riječi i fraza koje članice i članovi odabranog zastupničkog kluba
    koriste češće od kolegica i kolega iz ostalih zastupničkih klubova u Gradskoj
    skupštini.


    Analiza se provodi prema statistici [tf-idf](https://en.wikipedia.org/wiki/Tf-idf).
