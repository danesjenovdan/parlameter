  info: >-
    # Pregled statistika posljednje sjednice za koju su podaci objavljeni na mrežnim
    stranicama [Grada Zagreba](https://zagreb.hr/).


    # Prisutnost klubova na sjednici na glasanju


    Klubovi su razvrstani prema postocima, na koliko su glasanja odabrane sjednice
    bili prisutni gradski zastupnici i zastupnice pojedinog zastupničkog kluba.


    # Glasanja


    Za sva glasanja na pojedinoj sjednici brojimo sve glasove (ZA, PROTIV, SUZDRŽANI)
    i broj gradskih zastupnika i zastupnica koji nisu glasali (NEMA), te u skladu
    s time prikazujemo rezultate.
