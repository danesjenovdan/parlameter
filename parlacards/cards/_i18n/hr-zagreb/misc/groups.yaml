card:
  title: Popis klubova
  info: >-
    # Trenutno aktivni zastupnički klubovi u Gradskoj skupštini.


    Zastupnički klubovi prikazani su po broju aktivnih zastupničkih mandata, a
    mogu se prikazivati i prema prisutnosti glasanjima njihovih članova, prema
    broju zastupničkih pitanja i inicijativa, te prema razjedinjenosti glasanja.
