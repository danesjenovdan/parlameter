card:
  title: Popis zastupnica i zastupnika
  info: >-
    # Popis svih trenutno aktivnih gradskih zastupnika i zastupnica koji odgovaraju
    korisničkom izboru.


    Popis se može uređivati tako da se kreće silazno ili uzlazno klikom na kategorije:
    ime, dob, obrazovanje, broj mandata ili klubovi.


    Popis se može filtrirati unosom imena i/ili prezimena u tražilicu.


    Popis se može filtrirati i odabirom pripadnosti kluba, radnog tijela, kao i odabirom
    simbola za muški ili ženski spol.


    Osim početnog stanja označenog kao "demografija", popis se može prilagođavati
    i odabirom analitičkih funkcija: prisutnost na glasanjima, br. zastupničkih pitanja
    i inicijativa ili neslaganje s klubom.
