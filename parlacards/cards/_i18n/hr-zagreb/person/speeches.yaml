card:
  title: Govori
  info: >-
    # Ispis poveznica na sve govore gradskog zastupnika ili zastupnice u aktualnom
    sazivu Gradske skupštine. 


    Prikaz i odabir može se prilagođavati unosom željenih izraza u tražilicu i prema
    datumu.


    Učitavaju se poveznice na sve govore po ovim kriterijima koji se mogu naći u dostupnim
    transkriptima sjednica Gradske skupštine.
