card:
  title: Br. zastupničkih pitanja i inicijativa
  info: >-
    # Broj zastupničkih pitanja i inicijativa koje je gradski zastupnik ili zastupnica
    postavio ili postavila tijekom aktualnog saziva Gradske skupštine. Taj broj automatski
    se uspoređuje s prosječnom vrijednosti svih zastupnika i s maksimalnom vrijednosti.


    Podatke se preuzimaju s mrežnih stranica [Grada Zagreba] (https://zagreb.hr/).
