card:
  title: Neslaganje s klubom
  info: >-
    # Odstupanje od većinskog rezultata glasanja kluba kojem gradski zastupnik ili
    zastupnica pripada, u odnosu na prosječnu i najveću vrijednost.


    Za svako glasanje računa se i to kako je većinski glasao koji zastupnički klub.


    Potom se za sva glasanja analizira koliko često je zastupnik ili zastupnica glasao
    ili glasala u skladu s većinskim glasanjem pripadnog zastupničkog kluba, te se
    rezultat slaganja izražava u postotku.


    Iz svih izračuna izostavljena su glasanja na kojima zastupnici i zastupnice nisu
    glasale.
