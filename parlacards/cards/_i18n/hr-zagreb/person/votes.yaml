card:
  title: Glasanja
  info: >-
    # Pregled rezultata svih glasanja odabranog gradskog zastupnika ili zastupnice
    tijekom sjednice Gradske skupštine.


    Kako je glasao ili glasala zastupnica ili zastupnik vidi se u krajnjem lijevom
    stupcu po svakoj pojedinoj točki. Rezultate svih glasanja prikazujemo u kategorijama
    "ZA", "PROTIV" i "SUZDRŽANI", a glasove gradskih zastupnica i zastupnika koji
    nisu glasali ili su bili odsutni, vodimo u kategoriji "NEMA". 


    Točnost prikazanih rezultata glasanja ovisi o točnosti podataka koji se preuzimaju
    sa službenih stranica [Grada Zagreba] (https://zagreb.hr/).
