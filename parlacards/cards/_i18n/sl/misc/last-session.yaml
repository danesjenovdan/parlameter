  title: Zadnja seja
  tfidf-title: Besede, ki so zaznamovale sejo
  attendance-title: Prisotnost poslanskih skupin na glasovanjih seje
  votes-title: Glasovanja
  info: >-
    # Pregled analiz zadnje seje, za katero so podatki objavljeni na spletnem
    mestu [DZ RS](https://www.dz-rs.si/).


    **BESEDE, KI SO ZAZNAMOVALE SEJO**


    Izpis 10 besed in besednih zvez, ki so bile na seji uporabljene pogosteje
    kot na vseh drugih sejah.


    Analizo izvajamo po statistiki
    [tf-idf](https://en.wikipedia.org/wiki/Tf-idf). Osnovo analize (korpus)
    predstavljajo vsi govori v DZ, dokument pa vsi govori na obravnavani seji.


    **PRISOTNOST POSLANSKIH SKUPIN NA GLASOVANJIH SEJE**


    Poslanske skupine razvrstimo glede na odstotek, ki je seštevek prisotnosti
    njihovih poslank in poslancev na glasovanjih izbrane seje.


    **GLASOVANJA**


    Za vsa glasovanja na posamezni seji preštejemo vse glasove (ZA, PROTI,
    VZDRŽANO) ter število poslank in poslancev, ki niso glasovali. Nato izpišemo
    rezultat glede na najpogostejši glas ali odsotnost.


    Za pravilnost rezultatov glasovanja skrbimo po najboljših močeh, a je
    predvsem pri vzdržanih in odsotnih glasovih ne moremo zagotavljati.
    Prisotnost poslank in poslancev se na sejah DZ ne preverja na vsakem
    glasovanju, zato se lahko zgodi, da je bila oseba vzdržana, pa je zaradi
    manjka podatkov v dokumentu z rezultati glasovanja, ki ga uporabljamo kot
    vir, na Parlametru ta oseba prikazana kot odsotna (rezultat: ni glasoval oz.
    glasovala).
