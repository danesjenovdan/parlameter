card:
  title: Glasovanje
  info: >-
    # Pregled posameznega glasovanja na seji.


    Rezultat posameznega glasovanja ima tri različne izpise: na ravni poslank in
    poslancev, na ravni poslanskih skupin ter glede na stran vlade.


    Prvi zavihek omogoča pregled glasov poslank in poslancev, filtriranje glede
    na vrednost glasovnice (ZA, PROTI, VZDRŽANO, NI GLASA) ter iskanje
    posameznih poslank in poslancev. Poleg krožnega grafikona se izpisuje
    večinski glas DZ na tem glasovanju. "60 % ZA" npr. pomeni, da je ZA
    glasovalo 60 % vseh poslank in poslancev z glasovalno pravico na tem
    glasovanju.


    Drugi zavihek prikazuje glasove poslanskih skupin. Na koncu vsake vrstice je
    izpisan večinski glas poslanske skupine, gumbi z vrednostmi glasovnic pa
    odpirajo sezname poslank in poslancev, ki so oddali tak glas.


    Tretji zavihek rezultat izpiše glede na stran vlade. Ponovno je na koncu
    vsake vrstice izpisan večinski glas, gumbi z vrednostmi glasovnic pa
    odpirajo sezname poslank in poslancev, ki so oddali tak glas.


    Za pravilnost rezultatov glasovanja skrbimo po najboljših močeh, a je
    predvsem pri vzdržanih in odsotnih glasovih ne moremo zagotavljati.
    Prisotnost poslank in poslancev se na sejah DZ ne preverja na vsakem
    glasovanju, zato se lahko zgodi, da je bila oseba vzdržana, pa je zaradi
    manjka podatkov v dokumentu z rezultati glasovanja, ki ga uporabljamo kot
    vir, na Parlametru ta oseba prikazana kot odsotna (rezultat: ni glasoval oz.
    glasovala).


    Nabor glasovanj pridobivamo s spletnega mesta [DZ
    RS](https://www.dz-rs.si/).
