card:
  title: Ujemanje s poslansko skupino
  info: >-
    # Seznam članic in članov poslanske skupine, razvrščen glede na to, kako
    pogosto glasujejo enako kot večina v poslanski skupini. Večja kot je
    vrednost,


    Za vsako glasovanje najprej izračunamo večinski glas poslanske skupine (ZA,
    PROTI ali VZDRŽANO), torej tisti glas, za katerega se je odločilo največ
    njenih članov in članic.
