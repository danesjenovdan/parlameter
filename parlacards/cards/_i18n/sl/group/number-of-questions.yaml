card:
  title: Št. poslanskih vprašanj in pobud
  info: >-
    # Število poslanskih vprašanj in pobud vseh članic in članov poslanske
    skupine v tem mandatu v primerjavi s povprečno in najvišjo vrednostjo.


    Vprašanja in pobude pridobivamo s spletnega mesta [DZ
    RS](https://www.dz-rs.si/).
