card:
  title: Najmanjkrat glasujejo enako
  info: >-
    # Seznam petih poslank in poslancev, ki najmanjkrat glasujejo enako kot
    večina v poslanski skupini. Razvrščeni so glede na odstotek ujemanja od
    najmanjšega proti največjemu.


    Za vsako glasovanje najprej izračunamo večinski glas poslanske skupine (ZA,
    PROTI ali VZDRŽANO), torej tisti glas, za katerega se je odločilo največ
    njenih članov in članic. Glasovanja, kjer je odsotna celotna poslanska
    skupina, umaknemo iz analize.


    Nato izračunamo odstotek ujemanja med rezultati glasovanj poslanske skupine
    in rezultati vseh poslank in poslancev tega sklica DZ. To storimo tako, da
    število glasovanj, kjer je posamezna oseba glasovala enako kot večina v
    skupini, delimo s skupnim številom vseh glasovanj, na katerih sta bila
    prisotna tako oseba kot vsaj ena članica oz. član skupine. Če takšnih
    glasovanj ni, je ujemanje 0 %.
