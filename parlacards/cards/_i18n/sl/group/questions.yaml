card:
  title: Poslanska vprašanja in pobude
  info: >-
    # Izpis vseh poslanskih vprašanj in pobud članic in članov izbrane poslanske
    skupine v tem mandatu.


    Vsa vprašanja in pobude razvrstimo po poslanski skupini, zraven pa povemo,
    katere članice in člani so jih podali ter kaj je bila tema.


    Vprašanja in pobude pridobivamo s spletnega mesta [DZ
    RS](https://www.dz-rs.si/).
