card:
  title: Prisotnost na glasovanjih sej DZ
  info: >-
    # Prisotnost poslanske skupine na glasovanjih v primerjavi s povprečjem in
    najvišjo vrednostjo.


    Preštejemo vse oddane glasove (ZA, PROTI in VZDRŽANO) vseh članic in članov
    izbrane poslanske skupine, nato pa to število delimo s številom vseh glasov,
    ki bi jih skupina lahko oddala. Rezultat izrazimo v odstotkih in ga
    primerjamo s povprečjem in najvišjo vrednostjo. 


    Podatke pridobivamo s spletnega mesta [DZ RS](https://www.dz-rs.si/).
