card:
  title: Raznolikost besedišča
  info: >-
    # Raznolikost besedišča v govorih članic in članov izbrane poslanske skupine
    v primerjavi s povprečno in najvišjo vrednostjo.


    Za izračun najprej preštejemo unikatne besede in število vseh izgovorjenih
    besed članic in članov izbrane poslanske skupine. Potem preštejemo,
    kolikokrat se vsaka unikatna beseda pojavi, in unikatne besede razdelimo v
    kategorije glede na število ponovitev (združimo besede, ki se ponovijo
    enkrat, dvakrat, trikrat itd.).


    Na koncu izračunamo koeficient tako, da število vseh unikatnih besed delimo
    z vsoto, ki jo dobimo na podlagi pogostosti ponavljanja besed. To vsoto
    izračunamo tako, da za vsako kategorijo besed glede na število ponovitev
    (enkrat, dvakrat, trikrat …) pomnožimo število besed v tej skupini s
    kvadratom njihove pogostosti (npr. število besed, ki se ponovijo enkrat \*
    1^2 \+ število besed, ki se ponovijo dvakrat \* 2^2 itd.).


    Če izračun opravimo na primeru povedi "Danes je nov dan in danes je dan za
    Parlameter", dobimo naslednji rezultat: 7 / ((4 \* 1^2) \+ (3 \* 2^2)) \=
    0,4375.


    Višji kot je izračunan koeficient, bolj raznoliko besedišče uporablja
    poslanska skupina, saj se ne zanaša na pogosto ponavljanje istih besed.
