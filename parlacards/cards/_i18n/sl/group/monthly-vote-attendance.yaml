card:
  title: Prisotnost skozi čas na plenarnih sejah DZ
  info: >-
    # Prisotnost izbrane poslanske skupine na glasovanjih na plenarnih sejah DZ
    skozi čas.


    Za vsak mesec posebej preštejemo vse oddane glasove vseh članic in članov
    izbrane poslanske skupine, nato pa to število delimo s številom vseh glasov,
    ki bi jih skupina v tistem mesecu lahko oddala. Rezultat izrazimo v
    odstotkih in ga prikažemo na grafu.


    Podatke pridobivamo s spletnega mesta [DZ RS](https://www.dz-rs.si/).
