card:
  title: Enotnost glasovanj
  info: >-
    # Enotnost izbrane poslanske skupine na glasovanjih sej Državnega zbora v
    primerjavi s povprečno in najvišjo stopnjo enotnosti med vsemi poslanskimi
    skupinami.


    Za vsako glasovanje za poslansko skupino preštejemo, koliko poslancev je
    oddalo katero glasovnico (ZA, PROTI, NI, VZDRŽAN). Izračunamo odstotek
    tistih, ki so glasovali za najbolj popularno opcijo. Tako dodimo mero
    enotnosti oz. odstotek poslank in poslancev, ki so se strinjali z
    večinskim glasom.


    Na podlagi rezultatov individualnih glasovanj izračunamo povprečni odstotek
    nestrinjanja, ki ga prikažemo v kartici.
