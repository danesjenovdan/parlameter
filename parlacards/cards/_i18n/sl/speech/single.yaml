card:
  title: Govor
  info: >-
    # Transkript posameznega govora poslanke ali poslanca na izbrani seji.


    Transkript seje, ki je v obliki HTML dokumenta objavljen na spletnem mestu
    [DZ RS](https://www.dz-rs.si/), strojno razbijemo na posamezne govorne
    nastope in jih v izvirnem vrstnem redu združimo v kartico transkript.


    To je kartica, ki predstavlja en govor.
