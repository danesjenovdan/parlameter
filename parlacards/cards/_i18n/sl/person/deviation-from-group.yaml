card:
  title: Ujemanje s poslansko skupino
  info: >-
    # Odstopanje poslanke ali poslanca od večinskega glasu lastne poslanske
    skupine v primerjavi s povprečno in najvišjo vrednostjo.


    Za vsa glasovanja najprej izračunamo večinski glas vsake poslanske skupine.
    To je tisti glas, za katerega se je odločila večina njenih poslank in
    poslancev.


    Nato za vsako poslanko ali poslanca ugotovimo, kateri poslanski skupini
    trenutno pripada, in za celotno obdobje članstva v tej skupini izračunamo
    odstotek ujemanja glasov. Višji kot je prikazan odstotek, večja je skladnost
    poslanke ali poslanca z lastno poslansko skupino.


    Rezultat prikažemo skupaj s povprečno in najvišjo vrednostjo.
