card:
  title: Glasovanja
  info: >-
    # Pregled vseh glasovanj poslanke ali poslanca v tem mandatu.


    Prikazujemo glasovanja trenutnega mandata skupaj z uradnim izidom in osebnim
    glasom poslanke ali poslanca.


    Z iskalnikom lahko iščeš po naslovu glasovanja, s filtri pa omejiš prikaz
    glede na osebni glas poslanke ali poslanca (ZA, PROTI, VZDRŽAN, ODSOTEN).


    Nabor glasovanj pridobivamo s spletnega mesta [DZ
    RS](https://www.dz-rs.si/).


    Za pravilnost rezultatov glasovanja skrbimo po najboljših močeh, a je
    predvsem pri vzdržanih in odsotnih glasovih ne moremo zagotavljati.
    Prisotnost poslank in poslancev se na sejah DZ ne preverja na vsakem
    glasovanju, zato se lahko zgodi, da je bila oseba vzdržana, pa je zaradi
    manjka podatkov v dokumentu z rezultati glasovanja, ki ga uporabljamo kot
    vir, na Parlametru ta oseba prikazana kot odsotna (rezultat: ni glasoval oz.
    glasovala).
