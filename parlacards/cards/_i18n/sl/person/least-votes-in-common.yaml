card:
  title: Najmanjkrat glasujejo enako
  info: >-
    # Seznam petih poslank in poslancev, ki najmanjkrat glasujejo enako kot
    izbrana poslanka ali poslanec. Seznam je razvrščen glede na odstotek
    ujemanja od najmanjšega proti največjemu.


    V analizo vključimo le tista glasovanja, na katerih sta glasovali obe
    primerjani osebi (ZA, PROTI ali VZDRŽANO). Odstotek ujemanja izračunamo
    tako, da število glasovanj, kjer sta obe osebi glasovali enako, delimo s
    skupnim številom glasovanj, kjer sta bili obe prisotni.
