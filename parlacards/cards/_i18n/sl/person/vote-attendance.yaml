card:
  title: Prisotnost na glasovanjih sej DZ
  info: >-
    # Prisotnost poslanke ali poslanca na glasovanjih v primerjavi s povprečno
    in najvišjo vrednostjo.


    Preštejemo vse oddane glasove poslanke ali poslanca in to število delimo s
    skupnim številom vseh glasovanj, na katerih je bilo treba glasovati.
    Rezultat prikažemo skupaj s povprečno in najvišjo vrednostjo.


    Podatke pridobivamo s spletnega mesta [DZ RS](https://www.dz-rs.si/).
