card:
  title: Govori
  info: >-
    # Seznam vseh govorov poslanke ali poslanca v tem mandatu, razvrščenih po
    datumu.


    Na seznam dodamo povezave do vseh govorov izbrane osebe, ki jih pridobivamo
    iz transkriptov sej na spletnem mestu [DZ RS](https://www.dz-rs.si/). Z
    iskalnikom lahko iščeš po vsebini govorov, s filtrom pa omejiš prikaz na
    izbrano časovno obdobje.
