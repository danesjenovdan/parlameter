card:
  title: Povprečno število govorov na sejo
  info: >-
    # Povprečno število govorov poslanke ali poslanca na sejo v primerjavi s
    povprečno in najvišjo vrednostjo.


    Preštejemo vse govore poslanke ali poslanca v tem mandatu in to število
    delimo s številom sej, na katerih je bila oseba prisotna. Rezultat prikažemo
    skupaj s povprečno in najvišjo vrednostjo.


    Povprečno vrednost izračunamo tako, da skupno število vseh govorov najprej
    delimo s številom vseh poslank in poslancev, nato pa še s številom vseh sej,
    na katerih so potekale razprave.


    Podatke pridobivamo s spletnega mesta [DZ RS](https://www.dz-rs.si/).
