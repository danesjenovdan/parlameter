card:
  title: Prisotnost skozi čas na plenarnih sejah DZ
  info: >-
    # Prisotnost poslanke oz. poslanca na glasovanjih na plenarnih sejah DZ
    skozi čas.


    Za vsak mesec preštejemo vse oddane glasove poslanke ali poslanca. To
    število delimo s skupnim številom vseh glasovanj, na katerih je bilo treba
    glasovati tisti mesec. Če oseba v izbranem mesecu ni imela mandata,
    prikažemo delež glasovanj, na katerih ni imela pravice glasovati.
