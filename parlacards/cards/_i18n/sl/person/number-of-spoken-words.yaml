card:
  title: Število izgovorjenih besed
  info: >-
    # Število izgovorjenih besed poslanke ali poslanca v vseh dosedanjih govorih
    v tem mandatu v primerjavi s povprečno in najvišjo vrednostjo.


    Preštejemo besede v govorih poslanke ali poslanca, ki jih najdemo v
    transkriptih na spletnem mestu [DZ RS](https://www.dz-rs.si/). Rezultat
    prikažemo skupaj s povprečno in najvišjo vrednostjo.
