card:
  title: Število izgovorjenih besed
  info: >-
    # Število izgovorjenih besed poslanke ali poslanca v vseh dosedanjih govorih
    v tem mandatu v primerjavi s povprečno in najvišjo vrednostjo.


    Preštejemo besede v vseh govorih poslanke ali poslanca na plenarnih sejah in
    sejah delovnih teles, za katere so na spletnem mestu
    [DZ RS](https://www.dz-rs.si/) objavljeni transkripti. Rezultat prikažemo
    skupaj s povprečno in najvišjo vrednostjo.
