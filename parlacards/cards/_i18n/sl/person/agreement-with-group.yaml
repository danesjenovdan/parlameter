card:
  title: Ujemanje s poslansko skupino
  info: >-
    # Ujemanje poslanke ali poslanca z večinskim glasom lastne poslanske
    skupine v primerjavi s povprečno in najvišjo vrednostjo.


    Za vsa glasovanja najprej izračunamo večinski glas vsake poslanske skupine.
    To je tisti glas (ZA, PROTI, VZDRŽANI, ODSOTNI), za katerega se je odločila
    večina njenih poslank in poslancev.


    Nato za vsako poslanko ali poslanca ugotovimo, kateri poslanski skupini
    trenutno pripada. Odstotek ujemanja izračunamo tako, da število glasovanj,
    na katerih je oseba glasovala enako večinskemu glasu, delimo s skupnim
    številom vseh glasovanj. Višji kot je prikazan odstotek, večje je ujemanje
    poslanke ali poslanca z lastno poslansko skupino.


    Rezultat prikažemo skupaj s povprečno in najvišjo vrednostjo.
