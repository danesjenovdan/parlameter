card:
  title: Besede, ki jo/ga zaznamujejo
  info: >-
    # Izpis 10 besed in besednih zvez, ki jih oseba uporablja pogosteje kot
    ostale poslanke in poslanci.


    Analizo izvajamo po statistiki
    [tf-idf](https://en.wikipedia.org/wiki/Tf-idf). Iz analize umikamo t. i.
    *stopwords*, torej tiste besede, ki se pojavljajo zelo pogosto in zato
    izgubijo svojo reprezentativnost (npr. povedati, napisati, bistvo …), ali pa
    same zase ne nosijo nobenega pomena (npr. vezniki, mašila …). Seznam teh
    besed je dostopen
    [tukaj](https://github.com/danesjenovdan/parladata/commit/3f6ee924ddd33ce71f392fefa4dde9c4fe64f82a).


    Osnovo analize (korpus) predstavljajo vsi govori vseh poslank in poslancev,
    dokument pa vsi govori te osebe. Zaradi majhnega števila izgovorjenih besed
    in umika *stopwords* se lahko pri nekaterih osebah prikaže manj kot 10
    rezultatov.
