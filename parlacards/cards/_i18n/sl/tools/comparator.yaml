card:
  title: Primerjalnik glasovanj
  info: >-
    # Prikaz glasovanj, na katerih so izbrane poslanke in poslanci v prvi
    skupini glasovali enako, v drugi pa drugače od njih.


    Z iskalnikoma izbereš poslanke in poslance, katerih glasovanja želiš
    primerjati. V prvem iskalniku izbiraš osebe, ki so na iskanih glasovanjih
    glasovale enako (ZA, PROTI, VZDRŽANI, ODSOTNI), v drugem pa tiste, ki so
    glasovale drugače od prve skupine.


    V analizo vključimo le tista glasovanja, v času katerih so imele vse izbrane
    osebe poslanski mandat.


    Podatke o glasovanjih pridobivamo s spletnega mesta
    [DZ RS](https://www.dz-rs.si/).
