card:
  title: Obvestila
  info: >-
    # Prijava na Parlametrova obvestila.

    S pomočjo obvestil omogočamo spremljanje razprav v državnem zboru o točno
    določenih tematikah. Nastaviti je mogoče iskano besedo ali besedno zvezo,
    določiti način ujemanja in izbrati pogostost obvestil. Sistem samodejno
    pošlje e-poštno obvestilo, ko se izbrani sprožilec pojavi na seji državnega
    zbora ali enega od delovnih teles.
