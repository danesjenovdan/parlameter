card:
  title: Zakon
  info: >-
    # Pregled izbranega zakona ali akta ter vseh z njim povezanih glasovanj in
    dokumentov.


    Na vrhu kartice je prikazan status zakona ali akta.


    Prvi zavihek omogoča pregled vseh glasovanj, ki so z njim povezana, vključno
    s končnim izidom. Drugi zavihek pa prikazuje vse zbrane dokumente, vezane na
    zakonodajni postopek.


    Podatke pridobivamo s spletnega mesta [DZ RS](https://www.dz-rs.si/).
