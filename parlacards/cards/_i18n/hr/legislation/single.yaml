card:
  title: Zakon
  info: >-
    # Pregled odabranog zakona ili akta te svih s njim povezanih glasanja i
    dokumenata.


    Na vrhu kartice prikazan je status zakona ili akta.


    Prvi kartični odjeljak omogućuje pregled svih glasanja povezanih s njim,
    uključujući konačni ishod. Drugi kartični odjeljak prikazuje sve prikupljene
    dokumente vezane uz zakonodavni postupak.


    Podatke dobivamo s internetske stranice Hrvatskog sabora.
