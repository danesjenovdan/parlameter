card:
  title: Glasanja
  info: >-
    # Pregled svih glasanja održanih na odabranoj sjednici.


    Za sva glasanja na pojedinoj sjednici prebrojimo sve glasove (ZA, PROTIV,
    SUZDRŽANI) te broj zastupnica i zastupnika koji nisu glasali. Zatim ispišemo
    rezultat prema najčešćem načinu na koji se glasalo ili izostanku.


    Pomoću tražilice možete pretraživati po naslovu glasanja, a pomoću filtera
    možete odabrati prikaz samo donesenih ili samo odbijenih glasanja.


    Skup glasanja dobivamo s mrežne stranice [Hrvatskog
    sabora](https://www.sabor.hr/).


    Za točnost rezultata glasanja trudimo se najbolje što možemo, no posebno kod
    suzdržanih i odsutnih glasova to ne možemo jamčiti. Prisutnost zastupnica i
    zastupnika na sjednicama Hrvatskog sabora ne provjerava se pri svakom
    glasanju, stoga se može dogoditi da je osoba bila suzdržana, ali da zbog
    nedostatka podataka u dokumentu s rezultatima glasanja, koji koristimo kao
    izvor, na Parlametru ta osoba bude prikazana kao odsutna (rezultat: nije
    glasala ili nije glasao).
