card:
  title: Jedinstvo glasanja
  info: >-
    # Jedinstvo odabranog zastupničkog kluba na glasanjima u usporedbi s
    prosječnom i najvećom razinom jedinstva među svim zastupničkim klubovima.


    Pri svakom glasanju za svaki zastupnički klub prvo izračunamo koliko je
    članica i članova dalo koji glas (ZA, PROTIV, SUZDRŽANI, ODSUTNI). Zatim
    izračunamo postotak onih koji su glasali za većinsku odluku. Tako dobivamo
    mjeru jedinstva, odnosno postotak zastupnica i zastupnika koji su se slagali
    s većinskim glasom.


    Na temelju rezultata pojedinačnih glasanja izračunavamo prosječni postotak
    slaganja koji prikazujemo u kartici.
