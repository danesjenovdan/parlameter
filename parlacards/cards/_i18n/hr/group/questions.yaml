card:
  title: Zastupnička pitanja i inicijative
  info: >-
    # Popis svih zastupničkih pitanja i inicijativa članica i članova odabranog
    zastupničkog kluba u ovom mandatu.


    Sva pitanja i inicijative razvrstamo po zastupničkom klubu, a uz to navodimo
    koje su ih članice i članovi podnijeli te koja je bila tema.


    Pitanja i inicijative dobivamo s internetske stranice Hrvatskog sabora.
