card:
  title: Raznolikost rječnika
  info: >-
    # Raznolikost rječnika u govorima članica i članova odabranog zastupničkog
    kluba u usporedbi s prosječnom i najvećom vrijednošću.


    Za izračun prvo prebrojimo pojedine riječi i ukupan broj izgovorenih riječi
    članica i članova odabranog zastupničkog kluba. Zatim prebrojimo koliko se
    puta pojavljuje svaka jedinstvena riječ i jedinstvene riječi razvrstamo u
    kategorije prema broju ponavljanja (spojimo riječi koje se pojavljuju
    jednom, dvaput, triput itd.).


    Na kraju izračunamo koeficijent tako da broj svih jedinstvenih riječi
    podijelimo sa zbrojem dobivenim na temelju učestalosti ponavljanja riječi.
    Taj zbroj izračunavamo tako da za svaku kategoriju riječi, prema broju
    ponavljanja (jednom, dvaput, triput …), pomnožimo broj riječi u toj skupini
    s kvadratom njihove učestalosti (npr. broj riječi koje se pojavljuju jednom
    \* 1² \+ broj riječi koje se pojavljuju dvaput \* 2² itd.).


    Ako izračun primijenimo na primjer rečenice: "Danas je nov dan i danas je
    dan za Parlametar", dobijemo rezultat: 7 / ((4 \* 1²) \+ (3 \* 2²)) \=
    0,4375.


    Što je izračunati koeficijent veći, to odabrani zastupnički klub koristi
    raznovrsniji rječnik, jer se ne oslanja na često ponavljanje istih riječi.
