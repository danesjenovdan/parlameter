  title: Osnovne informacije
  info: >-
    # Pregled osnovnih informacija o odabranom zastupničkom klubu.


    Sadržaje za ovu karticu dobivamo s mrežne stranice Hrvatskog sabora i od
    službi za odnose s javnošću pojedinih zastupničkih klubova, a nedostajuće
    podatke pronalazimo na internetu.
