card:
  title: Prisutnost na glasanjima kroz vrijeme
  info: >-
    # Prisutnost odabranog zastupničkog kluba na glasanjima na plenarnim
    sjednicama Hrvatskog sabora kroz vrijeme.


    Za svaki mjesec posebno prebrojimo sve glasove svih članica i članova
    odabranog zastupničkog kluba, a zatim taj broj podijelimo s ukupnim brojem
    glasova koje je klub u tom mjesecu mogao dati. Rezultat izrazimo u postocima
    i prikažemo na grafu.


    Podatke dobivamo s internetske stranice Hrvatskog sabora.
