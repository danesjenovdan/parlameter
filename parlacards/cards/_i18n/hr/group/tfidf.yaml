card:
  title: Riječi koje označavaju klub
  info: >-
    # Popis 10 riječi i izraza koje odabrani zastupnički klub koristi češće nego
    ostali zastupnički klubovi.


    Analizu provodimo pomoću [tf-idf](https://en.wikipedia.org/wiki/Tf%E2%80%93idf)
    statistike. Iz analize uklanjamo tzv. stop-riječi, odnosno one riječi koje
    se pojavljuju vrlo često i stoga gube svoju reprezentativnost (npr. reći,
    napisati, biti …), ili same po sebi ne nose nikakvo značenje (npr. Veznici,
    pomoćne riječi…). Popis tih riječi dostupan je
    [ovdje](https://github.com/danesjenovdan/parlameter/blob/dev/parladata/parlacards/lemmatizers/hr/stop_words.py).


    Osnovu analize (korpus) čine svi govori svih zastupnica i zastupnika, a
    dokument predstavljaju svi govori članica i članova tog zastupničkog kluba.
    Zbog malog broja izgovorenih riječi i uklanjanja "stop riječi", kod nekih
    zastupničkih klubova može se prikazati manje od 10 rezultata.
