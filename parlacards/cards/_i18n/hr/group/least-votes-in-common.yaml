card:
  title: Najrjeđe glasaju isto
  info: >-
    # Popis pet zastupnica i zastupnika koji najrjeđe glasaju isto kao većina u
    odabranom zastupničkom klubu. Razvrstani su prema postotku podudaranja, od
    najmanjeg prema najvećem.


    Za svako glasanje prvo izračunamo većinski glas zastupničkog kluba (ZA,
    PROTIV, SUZDRŽANI, ODSUTNI), tj. onaj glas za koji se odlučio najveći broj
    njegovih članica i članova. Glasanja u kojima je cijeli zastupnički klub
    odsutan, uklanjamo iz analize.


    Zatim izračunamo postotak podudaranja između rezultata glasanja zastupničkog
    kluba i rezultata svih zastupnica i zastupnika ovog saziva Hrvatskog sabora.
    To radimo tako da broj glasanja u kojima je pojedina osoba glasala isto kao
    većina u klubu, podijelimo s ukupnim brojem svih glasanja na kojima su bila
    prisutna i ta osoba i barem jedna članica ili član kluba. Ako takvih
    glasanja nema, podudaranje iznosi 0%.
