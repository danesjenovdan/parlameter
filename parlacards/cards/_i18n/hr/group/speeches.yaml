card:
  title: Govori
  info: >-
    # Popis svih govora članica i članova odabranog zastupničkog kluba u ovom
    mandatu, razvrstanih po datumu.


    Na popis dodajemo poveznice na sve govore članica i članova odabranog
    zastupničkog kluba, koje dobivamo iz transkripata sjednica na internetskoj
    stranici Hrvatskog sabora. Pretraživanjem možete tražiti po sadržaju govora,
    a pomoću filtera ograničiti prikaz na odabrani vremenski period.
