card:
  title: Glasanje
  info: >-
    # Pregled pojedinog glasanja na sjednici.


    Rezultat pojedinog glasanja ima tri različita prikaza: na razini zastupnica
    i zastupnika, na razini zastupničkih klubova te u odnosu na stav Vlade.


    Prva kartica omogućava pregled glasova zastupnica i zastupnika, filtriranje
    prema vrijednosti glasa (ZA, PROTIV, SUZDRŽANI, ODSUTNI) te pretraživanje
    pojedinih zastupnica i zastupnika. Uz kružni grafikon prikazuje se i
    većinski glas Hrvatskog sabora na ovom glasanju. Na primjer, "60 % ZA" znači
    da je ZA glasalo 60 % svih zastupnica i zastupnika s pravom glasa na tom
    glasanju.


    Druga kartica prikazuje glasove zastupničkih klubova. Na kraju svakog retka
    prikazan je većinski glas zastupničkog kluba, a gumbi s vrijednostima
    glasova otvaraju popise zastupnica i zastupnika koji su dali taj glas.


    Treća kartica prikazuje rezultat u odnosu na stav Vlade. Ponovno je na kraju
    svakog retka prikazan većinski glas, a gumbi s vrijednostima glasova
    otvaraju popise zastupnica i zastupnika koji su dali taj glas.


    Za točnost rezultata glasanja trudimo se najbolje što možemo, no posebno kod
    suzdržanih i odsutnih glasova ne možemo to jamčiti. Prisutnost zastupnica i
    zastupnika na sjednicama Hrvatskog sabora ne provjerava se pri svakom
    glasanju, stoga se može dogoditi da je osoba bila suzdržana, ali da zbog
    nedostatka podataka u dokumentu s rezultatima glasanja, koji koristimo kao
    izvor, na Parlametru ta osoba bude prikazana kao odsutna (rezultat: nije
    glasala ili nije glasao).


    Skup glasanja dobivamo s mrežne stranice [Hrvatskog
    sabora](https://www.sabor.hr/).
