card:
  title: Obavijesti
  info: >-
    # Prijavite se na obavijesti Parlametra.

    Pomoću obavijesti omogućujemo vam praćenje rasprava u Hrvatskom saboru 
    o određenim temama. Možete odabrati riječ ili izraz za pretraživanje, 
    odrediti razinu podudaranja i odabrati učestalost slanja obavijesti. 
    Sustav će vam automatski slati obavijesti e-mailom kada se odabrani 
    okidač izgovori na sjednici Hrvatskog sabora ili nekog od njegovih 
    radnih tijela.
