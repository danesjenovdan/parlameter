card:
  title: Obavijesti
  info: >-
    # Prijavite se na obavijesti Parlametra.

    Obavijesti vam omogućuju praćenje rasprava, glasanja i zakonodavnog postupka u Hrvatskom saboru. Možete odabrati riječ ili izraz za pretraživanje, odrediti razinu podudaranja i odabrati učestalost slanja obavijesti. Sustav će vam automatski slati obavijest e-mailom kada se odabrani izraz izgovori na sjednici Sabora ili nekog od njegovih radnih tijela, odnosno kad se pojavi u nekom od glasanja ili u postupku donošenja nekog zakona.
