card:
  title: Govor
  info: >-
    # Transkript pojedinačnog govora zastupnice ili zastupnika na odabranoj
    sjednici.


    Transkript sjednice, koji je u obliku HTML dokumenta objavljen na mrežnoj
    stranici Hrvatskog sabora, strojno razdvajamo na pojedinačne govorne nastupe
    i zatim ih u izvornom redoslijedu spajamo u karticu transkripta.


    Ovo je kartica koja predstavlja jedan govor.
