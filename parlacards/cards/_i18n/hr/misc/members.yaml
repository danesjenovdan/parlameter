card:
  title: Popis zastupnika i zastupnica
  info: >-
    # Popis svih trenutno aktivnih zastupnica i zastupnika koji odgovaraju vašem
    upitu.


    Na vrhu kartice možete klikom na željeni filter birati između različitih
    analiza (demografija, prisutnost na glasanjima, aktivnost, usklađenost sa
    zastupničkim klubom). Pomoću tražilice možete pretraživati pojedinu
    zastupnicu ili zastupnika, a popis možete filtrirati i prema zastupničkom
    klubu, izbornoj jedinici i spolu.


    Rezultate možete razvrstati klikom na zaglavlja stupaca.


    Stupac "Analiza" prikazuje ukupni rezultat odabrane analize za cijeli
    odabrani mandat (npr. postotak prisutnosti pojedine zastupnice ili
    zastupnika na svim glasanjima u odabranom mandatu).
