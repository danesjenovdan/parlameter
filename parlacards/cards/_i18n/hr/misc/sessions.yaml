card:
  title: Popis sjednica
  info: >-
    # Popis svih sjednica ovog saziva Hrvatskog sabora.


    Na vrhu kartice možete klikom na željeni filter odabrati prikaz sjednica
    Hrvatskog sabora te njegovih odbora, komisija i drugih tijela. Rezultate
    možete razvrstati po imenu ili datumu.


    Podatke dobivamo s mrežne stranice [Hrvatskog
    sabora](https://www.sabor.hr/).
