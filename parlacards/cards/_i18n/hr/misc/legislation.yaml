card:
  title: Popis zakona
  info: >-
    # Popis svih zakona i akata o kojima se glasalo u ovom sazivu Hrvatskog
    sabora.


    Pomoću tražilice možete pretraživati po naslovu, a klikom na željeni filter
    možete odabrati prikaz samo zakona ili samo akata. Rezultate možete
    razvrstati po nazivu, po identifikacijskoj oznaci saborskog akta, datumu ili
    statusu (donesen, odbijen ili u proceduri).


    Podatke dobivamo s mrežne stranice Hrvatskog sabora.
