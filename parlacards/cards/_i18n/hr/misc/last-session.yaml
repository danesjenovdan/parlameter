card:
  title: Zadnja sjednica
  tfidf-title: Riječi koje označavaju sjednicu
  attendance-title: Prisutnost klubova na sjednici na glasanju
  votes-title: Glasanja
  info: >-
    # Pregled analiza zadnje sjednice, za koju su podaci objavljeni na mrežnoj
    stranici [Hrvatskog sabora](https://www.sabor.hr/).


    **RIJEČI KOJE SU OBILJEŽILE SJEDNICU**


    Ispis 10 riječi i fraza koje su na sjednici korištene češće nego na svim
    prethodnim sjednicama.


    Analizu provodimo prema statistici
    [tf-idf](https://en.wikipedia.org/wiki/Tf%E2%80%93idf). Temelj analize
    (korpus) čine svi govori u Hrvatskom saboru, a dokument čine svi govori na
    analiziranoj sjednici.


    **PRISUTNOST ZASTUPNIČKIH KLUBOVA NA GLASANJIMA SJEDNICE**


    Zastupničke klubove razvrstavamo prema postotku koji predstavlja zbroj
    prisutnosti njihovih zastupnica i zastupnika na glasanjima odabrane
    sjednice.


    **GLASANJA**


    Za sva glasanja na pojedinoj sjednici prebrojimo sve glasove (ZA, PROTIV,
    SUZDRŽANI) te broj zastupnica i zastupnika koji nisu glasali. Zatim ispišemo
    rezultat prema najčešćem načinu na koji se glasalo ili izostanku.


    Za točnost rezultata glasanja trudimo se najbolje što možemo. To, međutim,
    posebno kod suzdržanih i odsutnih glasova ne možemo jamčiti. Prisutnost
    zastupnica i zastupnika na sjednicama Hrvatskog sabora ne provjerava se pri
    svakom glasanju, stoga se može dogoditi da je osoba bila suzdržana, a da
    zbog nedostatka podataka u dokumentu s rezultatima glasanja, koji koristimo
    kao izvor, na Parlamentru ta osoba bude prikazana kao odsutna (rezultat:
    nije glasala ili nije glasao).
