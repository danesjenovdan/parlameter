card:
  title: Nepodudarnost sa zastupničkim klubom
  info: >-
    # Odstupanje zastupnice ili zastupnika od većinskog glasa vlastitog
    zastupničkog kluba u usporedbi s prosječnom i najvećom vrijednošću.


    Za sva glasanja prvo izračunavamo većinski glas svakog zastupničkog kluba.
    To je onaj glas (ZA, PROTIV, SUZDRŽANI, ODSUTNI) za koji se odlučila većina
    njegovih zastupnica i zastupnika.


    Zatim za svaku zastupnicu ili zastupnika utvrđujemo kojem zastupničkom klubu
    trenutno pripada. Postotak nepodudarnosti izračunavamo tako da broj glasanja
    na kojima je osoba glasala drugačije od većinskog glasa, dijelimo s ukupnim
    brojem svih glasanja. Što je prikazani postotak veći, to je odstupanje
    zastupnice ili zastupnika od vlastitog zastupničkog kluba veće.


    Rezultat prikazujemo zajedno s prosječnom i najvećom vrijednošću.
