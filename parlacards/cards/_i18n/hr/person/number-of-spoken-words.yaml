card:
  title: Broj izgovorenih riječi
  info: >-
    # Broj izgovorenih riječi zastupnice ili zastupnika u svim dosadašnjim
    govorima u ovom mandatu u usporedbi s prosječnom i najvećom vrijednošću.


    Prebrojimo riječi u govorima zastupnice ili zastupnika koje pronađemo u
    transkriptima na mrežnoj stranici Hrvatskog sabora. Rezultat prikazujemo
    zajedno s prosječnom i najvećom vrijednošću.
