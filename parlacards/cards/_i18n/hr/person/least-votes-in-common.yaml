card:
  title: Najrjeđe glasaju isto
  info: >-
    # Popis pet zastupnica i zastupnika koji najrjeđe glasaju isto kao odabrana
    zastupnica ili zastupnik. Popis je razvrstan prema postotku podudarnosti od
    najmanjeg prema najvećem.


    U analizu uključujemo samo ona glasanja na kojima su obje uspoređivane osobe
    bile prisutne i glasale (ZA, PROTIV, SUZDRŽANI). Postotak podudarnosti
    izračunavamo tako da broj glasanja u kojima su obje osobe glasale isto,
    podijelimo s ukupnim brojem glasanja na kojima su obje bile prisutne.
