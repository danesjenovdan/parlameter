card:
  title: Prisutnost na glasanjima
  info: >-
    # Prisutnost pojedine zastupnice ili zastupnika na glasanjima u usporedbi s
    prosjekom i s prisutnosti najprisutnije zastupnice ili zastupnika.


    Prebrojimo sve glasove koje je dala zastupnica ili zastupnik i taj broj
    dijelimo s ukupnim brojem glasanja na kojima je trebalo glasati. Rezultat
    prikazujemo zajedno s prosječnom i najvišom vrijednošću.


    Podatke dobivamo s mrežne stranice [Hrvatskog
    sabora](https://www.sabor.hr/).
