card:
  title: Broj zastupničkih pitanja i inicijativa
  info: >-
    # Broj zastupničkih pitanja i inicijativa zastupnice ili zastupnika u ovom
    mandatu u usporedbi s prosječnim brojem svih zastupnika i zastupnica i s
    brojem onog zastupnika ili zastupnice koji je imao najviše pitanja i
    inicijativa.


    Podatke dobivamo s mrežne stranice [Hrvatskog
    sabora](https://www.sabor.hr/).
