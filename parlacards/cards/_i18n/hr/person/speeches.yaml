card:
  title: Govori
  info: >-
    # Popis svih govora zastupnice ili zastupnika u ovom mandatu, razvrstanih po
    datumu.


    Na popis dodajemo poveznice na sve govore odabrane osobe, koje dobivamo iz
    transkripata sjednica na mrežnoj stranici Hrvatskog sabora. Pomoću tražilice
    možete pretraživati po sadržaju govora, a pomoću filtera možete ograničiti
    prikaz na odabrano vremensko razdoblje.
