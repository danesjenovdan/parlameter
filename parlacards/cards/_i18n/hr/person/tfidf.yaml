card:
  title: Riječi koje obilježavaju osobu
  info: >-
    # Ispis 10 riječi i fraza koje osoba koristi češće nego ostale zastupnice i
    zastupnici.


    Analizu provodimo prema statistici
    [tf-idf](https://en.wikipedia.org/wiki/Tf%E2%80%93idf). Iz analize uklanjamo
    tzv. "stop riječi", odnosno riječi koje se pojavljuju vrlo često i stoga
    gube svoju reprezentativnost (npr. riječi, napisati, biti…) ili riječi koje
    same po sebi nemaju značenje (npr. veznici, pomoćne riječi…). Popis tih
    riječi dostupan je
    [ovdje](https://github.com/danesjenovdan/parlameter/blob/dev/parladata/parlacards/lemmatizers/hr/stop_words.py).


    Temelj analize (korpus) čine svi govori svih zastupnica i zastupnika, a
    dokument čine svi govori te osobe. Zbog malog broja izgovorenih riječi i
    uklanjanja "stop riječi" kod nekih osoba može se prikazati manje od 10
    rezultata.
