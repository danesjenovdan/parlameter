card:
  title: Prisutnost na glasanjima kroz vrijeme
  info: >-
    # Prisutnost zastupnice ili zastupnika na glasanjima na plenarnim sjednicama
    Hrvatskog sabora kroz vrijeme.


    Za svaki mjesec prebrojimo sve glasove zastupnice ili zastupnika. Taj broj
    dijelimo s ukupnim brojem glasanja na kojima je trebalo glasati u tom
    mjesecu. Ako osoba u odabranom mjesecu nije imala mandat, za to razdoblje
    posebno prikazujemo udio glasanja na kojima nije imala pravo glasa.
