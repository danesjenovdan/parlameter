apiVersion: v1
kind: Service
metadata:
  name: parladata-ukrajina
spec:
  selector:
    app: parladata-ukrajina
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: parladata-ukrajina-nginx
spec:
  selector:
    app: parladata-ukrajina
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
