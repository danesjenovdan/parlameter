apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: enable-cors
spec:
  headers:
    accessControlAllowOriginList:
      - "*"
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - "*"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parladata-ajdovscina
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - data.ajdovscina.parlameter.si
      secretName: parladata-ajdovscina-tls
  rules:
    - host: data.ajdovscina.parlameter.si
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: parladata-ajdovscina
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parladata-ajdovscina-nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    traefik.ingress.kubernetes.io/router.middlewares: "parlameter-ajdovscina-enable-cors@kubernetescrd"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - files.data.ajdovscina.parlameter.si
      secretName: parladata-ajdovscina-nginx-tls
  rules:
    - host: files.data.ajdovscina.parlameter.si
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: parladata-ajdovscina-nginx
                port:
                  number: 80
