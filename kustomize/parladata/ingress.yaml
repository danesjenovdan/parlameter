apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parladata-slovenija-staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - data.staging.parlameter.si
      secretName: parladata-slovenija-staging-tls
  rules:
    - host: data.staging.parlameter.si
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: parladata-slovenija-staging
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parladata-slovenija-staging-nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - files.data.staging.parlameter.si
      secretName: parladata-slovenija-staging-nginx-tls
  rules:
    - host: files.data.staging.parlameter.si
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: parladata-slovenija-staging-nginx
                port:
                  number: 80
