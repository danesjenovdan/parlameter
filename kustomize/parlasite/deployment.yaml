apiVersion: apps/v1
kind: Deployment
metadata:
  name: parlasite
  labels:
    app: parlasite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parlasite
  template:
    metadata:
      labels:
        app: parlasite
    spec:
      containers:
        - name: parlasite
          image: parlasite-bosna
          ports:
            - containerPort: 3066
          resources:
            requests:
              memory: 400Mi
              cpu: 100m
            limits:
              memory: 400Mi
              cpu: 100m
          env:
            - name: PARLASITE_CDN_URL
              value: "https://parlassets-bosna.lb.djnd.si"
            - name: PARLASITE_CARDS_URL
              value: "https://parlacards-bosna.lb.djnd.si"
            - name: PARLASITE_DATA_URL
              value: "https://parladata-bosna.lb.djnd.si/v3"
            - name: PARLASITE_LEADER_ID
              value: "0"
            - name: PARLASITE_ROOT_ORG_ID
              value: "6"
            - name: PARLASITE_ROOT_ORG_ID2
              value: "23"
            - name: PARLASITE_MANDATE_ID
              value: "1"
            - name: PARLASITE_DEFAULT_CARD_DATE
              value: "2022-11-29"
            - name: PARLASITE_NEWSLETTER_SEGMENT_ID
              value: "3"
