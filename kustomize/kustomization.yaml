apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: parlameter-ua
resources:
  - parladata/deployment.yaml
  - parladata/ingress.yaml
  - parladata/pvc.yaml
  - parladata/service.yaml
  - parladata/solr.yaml
  # uncomment cronjob to enable it
  # - parladata/cronjobs/task_runner_cronjob.yaml

  - parlacards/deployment.yaml
  - parlacards/ingress.yaml
  - parlacards/service.yaml

  - parlasite/deployment.yaml
  - parlasite/ingress.yaml
  - parlasite/service.yaml

  - parlassets/deployment.yaml
  - parlassets/ingress.yaml
  - parlassets/service.yaml
images:
  - name: parladata-ua
    newName: rg.fr-par.scw.cloud/djnd/parladata-ua
    newTag: '89c962ee849aa88fcf1d3a11549c30d6b587f787'
  - name: parlasolr-ua
    newName: rg.fr-par.scw.cloud/djnd/parlasolr-ua
    newTag: '89c962ee849aa88fcf1d3a11549c30d6b587f787'
  - name: parlacards-ua
    newName: rg.fr-par.scw.cloud/djnd/parlacards-ua
    newTag: '89c962ee849aa88fcf1d3a11549c30d6b587f787'
  - name: parlasite-ua
    newName: rg.fr-par.scw.cloud/djnd/parlasite-ua
    newTag: '89c962ee849aa88fcf1d3a11549c30d6b587f787'
  - name: parlassets-ua
    newName: rg.fr-par.scw.cloud/djnd/parlassets-ua
    newTag: '89c962ee849aa88fcf1d3a11549c30d6b587f787'
