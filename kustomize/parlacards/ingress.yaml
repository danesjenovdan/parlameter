apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parlacards
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - glej.medvode.parlameter.si
        - kartica.medvode.parlameter.si
      secretName: parlacards-tls
  rules:
    - host: glej.medvode.parlameter.si
      http: &http_paths
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: parlacards
                port:
                  number: 3000
    - host: kartica.medvode.parlameter.si
      http: *http_paths