apiVersion: apps/v1
kind: Deployment
metadata:
  name: parlacards
  labels:
    app: parlacards
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parlacards
  template:
    metadata:
      labels:
        app: parlacards
    spec:
      containers:
        - name: parlacards
          image: parlacards-zagreb
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: 1000Mi
              cpu: 200m
            limits:
              memory: 1000Mi
              cpu: 200m
          env:
            - name: VITE_PARLASSETS_URL
              value: https://files.zagreb.parlametar.hr
            - name: VITE_PARLADATA_URL
              value: https://data.zagreb.parlametar.hr/v3
            - name: VITE_PARLACARDS_URL
              value: https://kartica.zagreb.parlametar.hr
            - name: VITE_PARLASITE_URL
              value: https://zagreb.parlametar.hr
            - name: VITE_METAIMAGES_URL
              value: https://meta-image-generator.lb.djnd.si/parlameter
            - name: VITE_PARLASITE_URL_BEFORE_2025_05_30
              value: https://2022.zagreb.parlametar.hr
            - name: SENTRY_DSN
              value: https://07dc842d53be467b8f158c93984a3fb9@o1076834.ingest.us.sentry.io/6080015
            - name: SENTRY_ENVIRONMENT
              value: zagreb
